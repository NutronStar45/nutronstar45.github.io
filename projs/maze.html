<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Maze generator and solver">
    <meta name="author" content="NutronStar45">
    <title>Maze Generator &amp; Solver</title>

    <link rel="stylesheet" href="/styles/common.css">
    <link rel="stylesheet" href="/styles/dark.css">
    <link rel="stylesheet" href="/styles/maze.css">
    <script src="https://code.jquery.com/jquery-4.0.0.slim.min.js" integrity="sha256-8DGpv13HIm+5iDNWw1XqxgFB4mj+yOKFNb+tHBZOowc=" crossorigin="anonymous"></script>
</head>

<body>
    <div id="header"></div>
    <div id="corner-box"></div>

    <h2>Maze Generator &amp; Solver</h2>

    <div id="sec-gen" class="section">
        <span>Generator</span>
        <div>
            <label>
                Width: <input id="width" type="number" min="1" max="1000" required>
            </label>
            <br>
            <label>
                Height: <input id="height" type="number" min="1" max="1000" required>
            </label>
        </div>
        <button id="gen">Generate</button>
        <p id="gen-status"></p>
    </div>

    <div id="sec-solve" class="section">
        <span>Solver</span>
        <div>
            <label>
                <input id="hide-path-after-solve" type="checkbox"> Hide Path After Solving
            </label>
            <br>

            <label alert-small="Coordinate outside maze" alert-big="Coordinate outside maze">
                Start: X
                <input id="start-x" type="number" min="1" max="#width" required>
            </label>
            <label alert-small="Coordinate outside maze" alert-big="Coordinate outside maze">
                Y
                <input id="start-y" type="number" min="1" max="#height" required>
            </label>
            <br>

            <label alert-small="Coordinate outside maze" alert-big="Coordinate outside maze">
                End: X
                <input id="end-x" type="number" min="1" max="#width" required>
            </label>
            <label alert-small="Coordinate outside maze" alert-big="Coordinate outside maze">
                Y
                <input id="end-y" type="number" min="1" max="#height" required>
            </label>
        </div>
        <button id="solve" alert-mazeNotGenerated="Maze not yet generated">Solve</button>
        <p id="solve-status"></p>
    </div>

    <div id="sec-maze" class="section">
        <span>Maze</span>
        <div>
            <button id="toggle-solution"></button>
            <div id="maze-img-container"></div>
        </div>
    </div>

    <script src="/scripts/common.js"></script>
    <script src="/scripts/maze.js"></script>
</body>

</html>
