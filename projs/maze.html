<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Maze generator and solver">
    <meta name="author" content="NutronStar45">
    <title>Maze Generator &amp; Solver</title>

    <link rel="stylesheet" href="/styles/common.css">
    <link rel="stylesheet" href="/styles/dark.css">
    <link rel="stylesheet" href="/styles/maze.css">
</head>

<body>
    <header></header>
    <section id="corner-box"></section>

    <h2>Maze Generator &amp; Solver</h2>

    <main>
        <section id="sec-generator">
            <h3>Generator</h3>

            <div>
                <label>
                    Width: <input id="width" type="number" min="1" max="1000" required>
                </label>
                <br>

                <label>
                    Height: <input id="height" type="number" min="1" max="1000" required>
                </label>
                <br>

                <label>
                    Algorithm:
                    <select id="generate-algorithm">
                        <option value="prims">Prim's</option>
                    </select>
                </label>
            </div>

            <div>
                <button id="generate">Generate</button>
                <button id="generate-cancel">Cancel</button>
            </div>

            <div id="subsec-generator-status">
                Generating maze <span id="generate-progress"></span> (<span id="generate-time"></span>)
                <br>
                <!-- `span#draw-maze-progress` will only be 0% or 100% because the UI will be freezed when drawing -->
                <!-- It is only put here for consistency -->
                Drawing maze <span id="draw-maze-progress"></span> (<span id="draw-maze-time"></span>)
            </div>
        </section>

        <section id="sec-solver">
            <h3>Solver</h3>

            <div>
                <label>
                    Start: X
                    <input id="start-x" type="number" min="1" alert-underflow="Coordinate outside maze" alert-overflow="Coordinate outside maze" required>
                </label>
                <label>
                    Y
                    <input id="start-y" type="number" min="1" alert-underflow="Coordinate outside maze" alert-overflow="Coordinate outside maze" required>
                </label>
                <br>

                <label>
                    End: X
                    <input id="end-x" type="number" min="1" alert-underflow="Coordinate outside maze" alert-overflow="Coordinate outside maze" required>
                </label>
                <label>
                    Y
                    <input id="end-y" type="number" min="1" alert-underflow="Coordinate outside maze" alert-overflow="Coordinate outside maze" required>
                </label>
                <br>

                <label>
                    Algorithm:
                    <select id="solve-algorithm">
                        <option value="deadendFilling">Deadend filling</option>
                        <!-- <optgroup label="Depth-first search">
                            <option value="leftHandRule">Left hand rule</option>
                            <option value="rightHandRule">Right hand rule</option>
                            <option value="randomDFS">Random</option>
                        </optgroup> -->
                    </select>
                </label>
                <br>

                <label>
                    <input id="hide-solution-after-solve" type="checkbox"> Hide solution after solving
                </label>
            </div>

            <div>
                <button id="solve">Solve</button>
                <button id="solve-cancel">Cancel</button>
            </div>

            <div id="subsec-solver-status">
                Solving <span id="solve-progress"></span> (<span id="solve-time"></span>)
                <br>
                <!-- `span#draw-solution-progress` will only be 0% or 100% because the UI will be freezed when drawing -->
                <!-- It is only put here for consistency -->
                Drawing solution <span id="draw-solution-progress"></span> (<span id="draw-solution-time"></span>)
            </div>
        </section>

        <section id="sec-maze">
            <h3>Maze</h3>
            <div id="subsec-download">
                <button id="download">Download as SVG</button>
                <span id="download-note">(Solution and endpoints won't be saved to the file if hidden)</span>
            </div>

            <div id="subsec-solution-visibility">
                <label>
                    <input id="show-solution" type="checkbox">
                    Show Solution
                </label>
                <br>
                <label>
                    <input id="show-endpoints" type="checkbox">
                    Show Endpoints
                </label>
            </div>

            <div id="maze-img-container"></div>
        </section>
    </main>

    <script type="importmap">
        {
            "imports": {
                "jquery.mjs": "https://code.jquery.com/jquery-4.0.0.slim.module.min.js"
            },
            "integrity": {
                "https://code.jquery.com/jquery-4.0.0.slim.module.min.js": "sha256-pfF5Ia5QBsbk5uvsmgKvY9knPinzh4d6ak09qdkaKz8="
            }
        }
    </script>
    <script src="/scripts/common.mjs" type="module"></script>
    <script src="/scripts/maze/maze.mjs" type="module"></script>
</body>

</html>
