<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Maze generator and solver">
    <meta name="author" content="NutronStar45">
    <title>Maze Generator &amp; Solver</title>

    <link rel="stylesheet" href="/styles/common.css">
    <link rel="stylesheet" href="/styles/dark.css">
    <link rel="stylesheet" href="/styles/maze.css">
    <script src="https://code.jquery.com/jquery-4.0.0.slim.min.js" integrity="sha256-8DGpv13HIm+5iDNWw1XqxgFB4mj+yOKFNb+tHBZOowc=" crossorigin="anonymous"></script>
</head>

<body>
    <header></header>
    <div id="corner-box"></div>

    <h2>Maze Generator &amp; Solver</h2>

    <main>
        <section id="sec-generator">
            <h3>Generator</h3>

            <div>
                <label>
                    Width: <input id="width" type="number" min="1" max="1000" required>
                </label>
                <br>

                <label>
                    Height: <input id="height" type="number" min="1" max="1000" required>
                </label>
            </div>

            <div>
                <button id="generate">Generate</button>
            </div>

            <div id="subsec-generator-status">
                Generating maze <span id="generate-progress"></span> (<span id="generate-time"></span>)
                <br>
                Drawing maze (<span id="draw-maze-time"></span>)
            </div>
        </section>

        <section id="sec-solver">
            <h3>Solver</h3>

            <div>
                <label alert-numberUnderflow="Coordinate outside maze" alert-numberOverflow="Coordinate outside maze">
                    Start: X
                    <input id="start-x" type="number" min="1" required>
                </label>
                <label alert-numberUnderflow="Coordinate outside maze" alert-numberOverflow="Coordinate outside maze">
                    Y
                    <input id="start-y" type="number" min="1" required>
                </label>
                <br>

                <label alert-numberUnderflow="Coordinate outside maze" alert-numberOverflow="Coordinate outside maze">
                    End: X
                    <input id="end-x" type="number" min="1" required>
                </label>
                <label alert-numberUnderflow="Coordinate outside maze" alert-numberOverflow="Coordinate outside maze">
                    Y
                    <input id="end-y" type="number" min="1" required>
                </label>
                <br>

                <label>
                    <input id="hide-solution-after-solve" type="checkbox"> Hide Solution After Solving
                </label>
            </div>

            <div>
                <button id="solve" alert-mazeNotGenerated="Maze not yet generated">Solve</button>
            </div>

            <div id="subsec-solver-status">
                Calculating solution <span id="solve-progress"></span> (<span id="solve-time"></span>)
                <br>
                Drawing solution (<span id="draw-solution-time"></span>)
            </div>
        </section>

        <section id="sec-maze">
            <h3>Maze</h3>
            <div id="subsec-download">
                <button id="download">Download as SVG</button>
                <span id="download-note">(Solution and endpoints won't be saved to the file if hidden)</span>
            </div>

            <div id="subsec-solution-visibility">
                <label>
                    <input id="show-solution" type="checkbox">
                    Show Solution
                </label>
                <br>
                <label>
                    <input id="show-endpoints" type="checkbox">
                    Show Endpoints
                </label>
            </div>

            <div id="maze-img-container"></div>
        </section>
    </main>

    <script src="/scripts/common_util.js"></script>
    <script src="/scripts/common.js"></script>
    <script src="/scripts/maze.js"></script>
</body>

</html>
