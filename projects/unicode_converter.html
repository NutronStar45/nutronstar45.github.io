<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="UTF encoding forms & schemes converter">
    <meta name="author" content="NutronStar45">
    <title>Unicode encodings converter</title>

    <link rel="stylesheet" href="/styles/common.css">

<body>
    <header></header>
    <section id="corner-box"></section>

    <h2>Unicode encodings converter</h2>

    <main>
        <section id="sec-text">
            <h3>Text</h3>
            <div>
                <button id="convert-from-text">Convert from text</button>
            </div>

            <div>
                <textarea id="text"></textarea>
            </div>
        </section>

        <section id="sec-utf8">
            <h3>UTF-32</h3>
            <div>
                <button id="convert-from-utf32">Convert from UTF-32</button>
            </div>

            <div>
                <textarea id="utf32"></textarea>
            </div>
        </section>
    </main>

    <script type="importmap">

            }
        }

    <script src="/dist/common.mjs" type="module"></script>
    <script src="/dist/unicode_converter/unicode_converter.mjs" type="module"></script>

</html>
