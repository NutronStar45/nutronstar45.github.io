<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Converts between text, Unicode code points, encoding forms and encoding schemes">
    <meta name="author" content="NutronStar45">
    <title>Unicode converter</title>

    <link rel="stylesheet" href="/styles/common.css">
    <link rel="stylesheet" href="/styles/dark.css">
    <link rel="stylesheet" href="/styles/unicode_converter.css">
</head>

<body>
    <header></header>
    <section id="corner-box"></section>

    <h2>Unicode converter</h2>

    <main>
        <section id="sec-text">
            <h3>Text</h3>
            <div>
                Text <button id="convert-from-text">Convert</button>
            </div>

            <div>
                <textarea id="text"></textarea>
            </div>

            <div id="text-message"></div>
        </section>

        <section id="sec-code-points">
            <h3>Code points</h3>
            <div>
                Code points (hexadecimal) <button id="convert-from-code-points-hex">Convert</button>
            </div>

            <div>
                <textarea id="code-points-hex"></textarea>
            </div>

            <div id="code-points-hex-message"></div>

            <div>
                Code points (decimal) <button id="convert-from-code-points-dec">Convert</button>
            </div>

            <div>
                <textarea id="code-points-dec"></textarea>
            </div>

            <div id="code-points-dec-message"></div>
        </section>

        <section id="sec-utf32">
            <h3>UTF-32</h3>
            <div>
                UTF-32 <button id="convert-from-utf32">Convert</button>
            </div>

            <div>
                <textarea id="utf32"></textarea>
            </div>

            <div id="utf32-message"></div>
        </section>
    </main>

    <script type="importmap">
        {
            "imports": {
                "jquery": "https://code.jquery.com/jquery-4.0.0.slim.module.min.js"
            },
            "integrity": {
                "https://code.jquery.com/jquery-4.0.0.slim.module.min.js": "sha256-pfF5Ia5QBsbk5uvsmgKvY9knPinzh4d6ak09qdkaKz8="
            }
        }
    </script>
    <script src="/dist/common.mjs" type="module"></script>
    <script src="/dist/unicode_converter/unicode_converter.mjs" type="module"></script>
</body>

</html>
